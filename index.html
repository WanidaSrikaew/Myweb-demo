<!DOCTYPE html>
<html lang="th">

<head>

        <main class="profile-card">
            <!-- Header Section -->
            <header class="profile-header">
                <div class="profile-avatar-container">
                    <div class="profile-avatar-wrapper">
                        <img src="img/003.jpg" alt="นางสาว วนิดา ศรีแก้ว" class="profile-avatar">
                    </div>
                </div>
                <h1 class="profile-name">วนิดา ศรีแก้ว</h1>
                <p class="profile-subtitle">ข้อมูลส่วนตัว & การติดต่อ</p>
            </header>

            <!-- Student Info Section -->
            <section class="info-section">
                <h2 class="section-title">ข้อมูลนักศึกษา</h2>
                <div class="info-list">
                    <div class="info-item">
                        <span class="info-label">ชื่อ - นามสกุล</span>
                        <span class="info-value">นางสาว วนิดา ศรีแก้ว</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">สถานศึกษา</span>
                        <span class="info-value">มหาวิทยาลัยราชภัฏศรีสะเกษ</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">สถานภาพการศึกษา</span>
                        <span class="info-value">กำลังศึกษาอยู่ชั้นปีที่ 2</span>
                    </div>
                </div>
            </section>

                        </div>
                        <div class="contact-action-arrow">
